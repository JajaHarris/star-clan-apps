<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=/CurrencyKing/legal/privacy/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to CurrencyKing Privacy Policy | Star Clan Apps LLC</title>
  <link rel="canonical" href="https://starclanapps.com/CurrencyKing/legal/privacy/" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-2: #a78bfa;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 32%),
                  radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.18), transparent 32%),
                  var(--bg);
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      padding: 32px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Redirecting…</h1>
    <p>
      The CurrencyKing Privacy Policy has moved to
      <a href="/CurrencyKing/legal/privacy/">/CurrencyKing/legal/privacy/</a>.
    </p>
  </div>

  <script>
    window.location.replace("/CurrencyKing/legal/privacy/");
  </script>
</body>
</html>
